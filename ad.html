<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ad</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
    }
</style>
</head>
<body>

<script>
(function() {
    function loadAd() {
        var s = document.createElement('script');
        s.src = "https://millionairelucidlytransmitted.com/f8/61/75/f86175a2d9c2d2b4202d2bd815cd1440.js";
        s.async = true;
        document.body.appendChild(s);
    }

    window.onload = loadAd;

    // fallback если не загрузилось
    setTimeout(function() {
        if (!document.body.innerHTML || document.body.innerHTML.length < 50) {
            document.body.innerHTML = "";
        }
    }, 5000);
})();
</script>

</body>
</html>
